services:
  coordinator:
    build:
      context: ./coordinator
    image: wardenhub/coordinator:latest
    container_name: wardenhub-coordinator
    restart: unless-stopped
    environment:
      - WARDENHUB_CONFIG=/etc/wardenhub/coordinator.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./config/coordinator.yaml:/etc/wardenhub/coordinator.yaml:ro
      - wardenhub-data:/data
    depends_on:
      pushgateway:
        condition: service_healthy
    networks:
      - wardenhub
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pushgateway:
    image: prom/pushgateway:latest
    container_name: wardenhub-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - wardenhub
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- Full observability stack (optional) ---
  # Use: docker compose --profile full up

  prometheus:
    image: prom/prometheus:latest
    container_name: wardenhub-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - pushgateway
    networks:
      - wardenhub
    profiles:
      - full

  grafana:
    image: grafana/grafana:latest
    container_name: wardenhub-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=changeme
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - wardenhub
    profiles:
      - full

  alertmanager:
    image: prom/alertmanager:latest
    container_name: wardenhub-alertmanager
    restart: unless-stopped
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - wardenhub
    profiles:
      - full

volumes:
  wardenhub-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  wardenhub:
    driver: bridge
