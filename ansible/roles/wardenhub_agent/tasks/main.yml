---
- name: Install python3, python3-venv, git
  ansible.builtin.package:
    name:
      - python3
      - python3-venv
      - git
    state: present

- name: Create venv at /opt/wardenhub-agent
  ansible.builtin.command:
    cmd: python3 -m venv /opt/wardenhub-agent
    creates: /opt/wardenhub-agent/bin/python

- name: Install wardenhub-agent into venv from GitHub
  ansible.builtin.command:
    cmd: /opt/wardenhub-agent/bin/pip install --quiet
         git+https://github.com/aenrione/wardenhub.git#subdirectory=agent
  register: pip_result
  changed_when: "'Successfully installed' in pip_result.stdout"

- name: Symlink wardenhub-agent binary to /usr/local/bin
  ansible.builtin.file:
    src: /opt/wardenhub-agent/bin/wardenhub-agent
    dest: /usr/local/bin/wardenhub-agent
    state: link

- name: Create config directory
  ansible.builtin.file:
    path: /etc/wardenhub
    state: directory
    mode: "0755"

- name: Write agent config
  ansible.builtin.template:
    src: agent.yaml.j2
    dest: /etc/wardenhub/agent.yaml
    mode: "0640"
  notify: Restart wardenhub timer

- name: Copy systemd service unit
  ansible.builtin.copy:
    src: wardenhub-agent.service
    dest: /etc/systemd/system/wardenhub-agent.service
    mode: "0644"
  notify: Reload systemd

- name: Copy systemd timer unit
  ansible.builtin.copy:
    src: wardenhub-agent.timer
    dest: /etc/systemd/system/wardenhub-agent.timer
    mode: "0644"
  notify: Reload systemd

- name: Enable and start wardenhub timer
  ansible.builtin.systemd:
    name: wardenhub-agent.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Run first audit immediately
  ansible.builtin.command: wardenhub-agent run --config /etc/wardenhub/agent.yaml
  register: first_run
  changed_when: false
  failed_when: false

- name: Show first audit result
  ansible.builtin.debug:
    msg: "{{ first_run.stdout_lines[-5:] if first_run.stdout_lines else first_run.stderr_lines[-3:] }}"
